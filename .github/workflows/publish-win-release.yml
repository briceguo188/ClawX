name: Publish Windows Release

on:
  workflow_dispatch:
    inputs:
      run_id:
        description: Actions run ID that produced the Windows artifact
        required: true
        type: string
      artifact_name:
        description: Artifact name to publish
        required: true
        default: clawx-win
        type: string
      tag_name:
        description: Release tag to create
        required: true
        type: string
      release_name:
        description: Release title
        required: true
        type: string

permissions:
  actions: read
  contents: write

jobs:
  publish-win-release:
    runs-on: ubuntu-latest

    steps:
      - name: Download Windows artifact from Actions
        uses: actions/download-artifact@v4
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          run-id: ${{ inputs.run_id }}
          name: ${{ inputs.artifact_name }}
          path: release-assets

      - name: Show downloaded files
        run: find release-assets -maxdepth 2 -type f -print

      - name: Verify expected assets exist
        run: |
          ls release-assets/*.exe
          ls release-assets/*.yml

      - name: Create public GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ inputs.tag_name }}" \
            release-assets/*.exe \
            release-assets/*.yml \
            --repo "${{ github.repository }}" \
            --title "${{ inputs.release_name }}" \
            --notes "Public Windows installer build published from Actions artifact run ${{ inputs.run_id }}." \
            --prerelease
