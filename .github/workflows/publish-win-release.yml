name: Publish Windows Release

on:
  workflow_dispatch:
    inputs:
      run_id:
        description: Actions run ID that produced the Windows artifact
        required: true
        type: string
      artifact_name:
        description: Artifact name to publish
        required: true
        default: clawx-win
        type: string
      tag_name:
        description: Release tag to create
        required: true
        type: string
      release_name:
        description: Release title
        required: true
        type: string
      prerelease:
        description: Mark release as prerelease
        required: true
        default: false
        type: boolean
      make_latest:
        description: Mark release as latest
        required: true
        default: true
        type: boolean

permissions:
  actions: read
  contents: write

jobs:
  publish-win-release:
    runs-on: ubuntu-latest

    steps:
      - name: Download Windows artifact from Actions
        uses: actions/download-artifact@v4
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          run-id: ${{ inputs.run_id }}
          name: ${{ inputs.artifact_name }}
          path: release-assets

      - name: Show downloaded files
        run: find release-assets -maxdepth 2 -type f -print

      - name: Verify expected assets exist
        run: |
          ls release-assets/*.exe
          ls release-assets/*.yml

      - name: Create public GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PRERELEASE_FLAG=""
          LATEST_FLAG="--latest"
          RELEASE_KIND="Stable release"

          if [ "${{ inputs.prerelease }}" = "true" ]; then
            PRERELEASE_FLAG="--prerelease"
            RELEASE_KIND="Pre-release"
          fi

          if [ "${{ inputs.make_latest }}" != "true" ]; then
            LATEST_FLAG=""
          fi

          gh release create "${{ inputs.tag_name }}" \
            release-assets/*.exe \
            release-assets/*.yml \
            --repo "${{ github.repository }}" \
            --title "${{ inputs.release_name }}" \
            --notes "## Summary

- Version: ${{ inputs.tag_name }}
- Repository: ${{ github.repository }}
- Source workflow run: ${{ inputs.run_id }}
- Release type: ${RELEASE_KIND}

## Assets

- \`ClawX-*-win-x64.exe\`: standard Windows installer
- \`ClawX-*-win-arm64.exe\`: Windows ARM64 installer
- \`ClawX-*-win.exe\`: combined installer artifact
- \`*.yml\`: electron-updater metadata consumed by this repository's releases

## Installation Notes

- Windows SmartScreen may warn on first launch. Click \"More info\" -> \"Run anyway\" if needed.
- Auto-update is configured to read releases from this repository." \
            $PRERELEASE_FLAG \
            $LATEST_FLAG
